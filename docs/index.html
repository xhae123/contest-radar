<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>contest-radar</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <main class="wrap">
    <!-- list view -->
    <div id="list-view">
      <header class="hero">
        <div>
          <h1>contest-radar</h1>
          <p class="subtitle">창업 · SW개발 · 아이디어 공모전을 추려서 보여줍니다.</p>
        </div>
        <span class="updated" id="updated"></span>
      </header>
      <nav class="controls">
        <div class="cats" id="cats">
          <button data-cat="ALL" class="active">전체</button>
          <button data-cat="창업">창업</button>
          <button data-cat="SW개발">SW개발</button>
          <button data-cat="아이디어">아이디어</button>
        </div>
        <input type="search" id="q" placeholder="검색" />
      </nav>
      <section class="list" id="list"></section>
    </div>

    <!-- detail view -->
    <div id="detail-view" hidden>
      <nav class="detail-nav">
        <button id="back" class="back-btn">← 목록으로</button>
      </nav>
      <article class="detail-page" id="detail-page"></article>
    </div>
  </main>

  <div class="lightbox" id="lightbox" hidden>
    <button class="lb-btn lb-prev" aria-label="이전">‹</button>
    <img id="lb-img" src="" alt="" />
    <button class="lb-btn lb-next" aria-label="다음">›</button>
    <button class="lb-close" aria-label="닫기">×</button>
  </div>
</body>
</html>
